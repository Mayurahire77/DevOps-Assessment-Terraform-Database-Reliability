version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: devops-postgres

    restart: always


    environment:

      POSTGRES_DB: appdb

      POSTGRES_USER: admin

      POSTGRES_PASSWORD: admin123


    ports:

      - "5432:5432"


    volumes:

      - postgres_data:/var/lib/postgresql/data

      - ./migrations:/docker-entrypoint-initdb.d/migrations

      - ./seeds:/docker-entrypoint-initdb.d/seeds


    networks:

      - database-network



volumes:

  postgres_data:



networks:

  database-network:

    driver: bridge